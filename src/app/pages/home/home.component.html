<div class="app-container">

  @if (saveError) {
    <div class="save-error-banner" role="alert">
      <span>{{ t().autoSaveError }}</span>
      <button class="save-error-dismiss" (click)="saveError = false" aria-label="Dismiss">✕</button>
    </div>
  }

  <!-- Hero Header -->
  <header class="hero-header">
    <app-language-switcher class="lang-switcher-anchor"></app-language-switcher>
    <div class="hero-dots" aria-hidden="true">
      <span class="dot dot-red"></span>
      <span class="dot dot-blue"></span>
      <span class="dot dot-green"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-purple"></span>
    </div>
    <h1 class="hero-title">{{ t().heroTitle }}</h1>
    <p class="hero-subtitle">{{ t().heroSubtitle }}</p>
    <a class="how-to-play-link" routerLink="how-to-play">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <path d="M12 17h.01"/>
      </svg>
      {{ t().howToPlayLink }}
    </a>
  </header>

  <!-- Mode Selector -->
  <app-mode-selector
    [initialMode]="mode"
    (modeChange)="onModeChange($event)">
  </app-mode-selector>

  <hr />

  <!-- Image Section Header -->
  <div class="images-section-header">
    <span class="images-section-title">{{ t().imagesNeeded(requiredImages) }}</span>
    @if (!showResetConfirm) {
      <div class="header-actions">
        <button mat-button color="primary" (click)="fillWithDefaults()">{{ t().fillWithDefaults }}</button>
        <button mat-button color="warn" [disabled]="!savedImageStates.length" (click)="showResetConfirm = true">{{ t().resetAll }}</button>
      </div>
    } @else {
      <div class="reset-confirm">
        <span>{{ t().deleteAllImages }}</span>
        <button mat-flat-button color="warn" (click)="resetAll()">{{ t().yesDelete }}</button>
        <button mat-button (click)="showResetConfirm = false">{{ t().cancel }}</button>
      </div>
    }
  </div>

  <!-- Image Upload & Editing -->
  <app-images-wrapper
    [requiredImages]="requiredImages"
    [initialImageStates]="savedImageStates"
    (imagesReady)="onImagesReady($event)"
    (imageStatesChange)="onImageStatesChange($event)">
  </app-images-wrapper>

  <hr />

  <!-- Generate Cards -->
  <div class="generate-section">
    <button
      mat-flat-button
      color="primary"
      class="btn-generate"
      [disabled]="!imagesReady"
      (click)="generateCards()">
      {{ cards.length ? t().reshuffleCards : t().generateCards(requiredImages) }}
    </button>
    <div class="layout-settings-anchor">
      <app-card-layout-settings
        [layout]="cardLayout"
        (layoutChange)="onLayoutChange($event)">
      </app-card-layout-settings>
    </div>
  </div>

  @if (cards.length) {
    <hr />

    <!-- Card Preview -->
    <app-card-preview
      [cards]="cards"
      [restoredLayouts]="savedCardLayouts"
      [cardLayout]="cardLayout"
      (cardLayoutsChange)="onCardLayoutsChange($event)">
    </app-card-preview>

    <hr />

    <!-- Export -->
    <app-export-panel
      [cards]="cards"
      [cardLayouts]="savedCardLayouts"
      [cardLayout]="cardLayout">
    </app-export-panel>
  }

  <footer class="app-footer">
    v{{ appVersion }} &nbsp;&bull;&nbsp; {{ t().footer }}
  </footer>

</div>
