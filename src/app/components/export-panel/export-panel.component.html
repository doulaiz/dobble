<div class="export-panel">
  @if (exportError) {
    <div class="save-error-banner" role="alert">
      <span>{{ exportError }}</span>
      <button class="save-error-dismiss" (click)="exportError = null" aria-label="Dismiss">✕</button>
    </div>
  }
  <div class="export-buttons">

    <button
      mat-flat-button
      color="primary"
      class="btn-export"
      [disabled]="exportingInstructions"
      (click)="exportInstructionCards()">
      <lucide-icon name="book-open" [size]="16" />
      {{ exportingInstructions ? t().exportingInstructions : t().exportInstructions }}
    </button>

    <div class="export-row">
      <button
        mat-flat-button
        color="primary"
        class="btn-export"
        [disabled]="!cards.length || exportingPng || exportingPdf"
        (click)="exportImages()">
        <lucide-icon name="download" [size]="16" />
        {{ exportingPng ? t().exportingPng : t().exportPng }}
      </button>

      <div class="print-hint">
        <span class="print-hint-label">{{ t().printHintLabel }}</span>
        <a href="https://www.printerstudio.com/unique-ideas/blank-playing-cards.html" target="_blank" rel="noopener noreferrer">PrinterStudio</a>
        <a href="https://www.boardgamesmaker.com/customized/custom-game-cards.html" target="_blank" rel="noopener noreferrer">BoardGamesMaker</a>
        <span class="print-hint-disclaimer">{{ t().printHintDisclaimer }}</span>
      </div>
    </div>

    <button
      mat-flat-button
      color="primary"
      class="btn-export"
      [disabled]="!cards.length || exportingPng || exportingPdf"
      (click)="exportPdf()">
      <lucide-icon name="download" [size]="16" />
      {{ exportingPdf ? t().exportingPdf : t().exportPdf }}
    </button>

  </div>
</div>
