<div class="layout-settings">

  <button mat-icon-button class="btn-layout-toggle" (click)="onToggleClick($event)" [title]="t().preview">
    <lucide-icon name="settings" [size]="20" />
  </button>

  @if (showPanel) {
    <div class="settings-backdrop"></div>
    <div class="settings-panel" (click)="$event.stopPropagation()">

      <button mat-icon-button class="btn-panel-close" (click)="showPanel = false" aria-label="Close settings">
        <lucide-icon name="x" [size]="18" />
      </button>

      <!-- Form -->
      <div class="settings-form">

        @if (!isRound) {
          <div class="field-row">
            <label class="field-label">{{ t().width }}</label>
            <div class="input-unit">
              <input type="number" min="10" max="500" class="field-input"
                [value]="layout.width"
                (input)="update('width', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>

          <div class="field-row">
            <label class="field-label">{{ t().height }}</label>
            <div class="input-unit">
              <input type="number" min="10" max="500" class="field-input"
                [value]="layout.height"
                (input)="update('height', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>

          <div class="field-row">
            <label class="field-label">{{ t().marginVertical }}</label>
            <div class="input-unit">
              <input type="number" min="0" max="100" class="field-input"
                [value]="layout.marginTop"
                (input)="update('marginTop', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>

          <div class="field-row">
            <label class="field-label">{{ t().marginHorizontal }}</label>
            <div class="input-unit">
              <input type="number" min="0" max="100" class="field-input"
                [value]="layout.marginLeft"
                (input)="update('marginLeft', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>
        } @else {
          <div class="field-row">
            <label class="field-label">{{ t().diameter }}</label>
            <div class="input-unit">
              <input type="number" min="10" max="500" class="field-input"
                [value]="layout.diameter"
                (input)="update('diameter', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>

          <div class="field-row">
            <label class="field-label">{{ t().margin }}</label>
            <div class="input-unit">
              <input type="number" min="0" max="100" class="field-input"
                [value]="layout.marginTop"
                (input)="update('marginTop', +$any($event.target).value)" />
              <span class="unit">mm</span>
            </div>
          </div>
        }

        <div class="field-row field-row--bg">
          <label class="field-label">{{ t().background }}</label>
          <div class="bg-controls">
            <button mat-stroked-button (click)="browseBackground()">
              <lucide-icon name="folder-open" [size]="15" />
              {{ t().browsePng }}
            </button>
            @if (layout.backgroundImage) {
              <button mat-button color="warn" (click)="clearBackground()">
                <lucide-icon name="x" [size]="14" />
                {{ t().remove }}
              </button>
            }
          </div>
        </div>

      </div>

      <!-- Preview -->
      <div class="settings-preview">
        <div class="preview-label-top">{{ t().preview }}</div>
        <div class="preview-card"
          [ngStyle]="previewCardStyle"
          [style.width.px]="previewCardWidth"
          [style.height.px]="previewCardHeight"
          [style.background-image]="previewBgStyle"
          [style.background-size]="'cover'"
          [style.background-position]="'center'"
          (click)="cycleShape()"
          title="Click to change shape">
          <div class="preview-margin-area" [ngStyle]="previewMarginStyle"></div>
          @if (hexagonMarginSvgPoints; as pts) {
            <svg [attr.width]="previewCardWidth" [attr.height]="previewCardHeight"
                 style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible">
              <polygon [attr.points]="pts"
                       fill="none"
                       stroke="rgba(74, 144, 217, 0.7)"
                       stroke-width="1.5"
                       stroke-dasharray="4 3" />
            </svg>
          }
        </div>
        <div class="preview-shape-label">{{ shapeLabel }}</div>
        <div class="preview-dims">
          @if (!isRound) {
            {{ layout.width }} × {{ layout.height }} mm
          } @else {
            ⌀ {{ layout.diameter }} mm
          }
        </div>
      </div>

    </div>
  }

</div>
