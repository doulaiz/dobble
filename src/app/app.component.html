<div class="app-container">

  <!-- Mode Selector -->
  <app-mode-selector
    [initialMode]="mode"
    (modeChange)="onModeChange($event)">
  </app-mode-selector>

  <hr />

  <!-- Image Upload & Editing -->
  <app-images-wrapper
    [requiredImages]="requiredImages"
    [initialImageStates]="savedImageStates"
    (imagesReady)="onImagesReady($event)"
    (imageStatesChange)="onImageStatesChange($event)">
  </app-images-wrapper>

  <hr />

  <!-- Generate Cards Button -->
  <div class="generate-section">
    <button
      class="btn-generate"
      [disabled]="!imagesReady"
      (click)="generateCards()">
      Generate 20 Cards
    </button>
  </div>

  <hr />

  <!-- Card Preview -->
  <app-card-preview
    [cards]="cards">
  </app-card-preview>

  <hr />

  <!-- Export -->
  <app-export-panel
    [cards]="cards">
  </app-export-panel>

</div>
