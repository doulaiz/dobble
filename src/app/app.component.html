<div class="app-container">

  <!-- Mode Selector -->
  <app-mode-selector
    [initialMode]="mode"
    (modeChange)="onModeChange($event)">
  </app-mode-selector>

  <hr />

  <!-- Image Section Header -->
  <div class="images-section-header">
    <span class="images-section-title">Images</span>
    @if (!showResetConfirm) {
      <button class="btn-reset-trigger" (click)="showResetConfirm = true">
        Start from scratch
      </button>
    } @else {
      <div class="reset-confirm">
        <span>Delete all images?</span>
        <button class="btn-confirm-yes" (click)="resetAll()">Yes, delete</button>
        <button class="btn-confirm-no" (click)="showResetConfirm = false">Cancel</button>
      </div>
    }
  </div>

  <!-- Image Upload & Editing -->
  <app-images-wrapper
    [requiredImages]="requiredImages"
    [initialImageStates]="savedImageStates"
    (imagesReady)="onImagesReady($event)"
    (imageStatesChange)="onImageStatesChange($event)">
  </app-images-wrapper>

  <hr />

  <!-- Generate Cards Button -->
  <div class="generate-section">
    <button
      class="btn-generate"
      [disabled]="!imagesReady"
      (click)="generateCards()">
      Generate 20 Cards
    </button>
  </div>

  <hr />

  <!-- Card Preview -->
  <app-card-preview
    [cards]="cards">
  </app-card-preview>

  <hr />

  <!-- Export -->
  <app-export-panel
    [cards]="cards">
  </app-export-panel>

</div>
