@if (showModal) {
  <div class="modal-overlay">
    <div class="modal">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title">Edit Image</h2>
        <button mat-icon-button class="btn-close" (click)="cancelModal()" aria-label="Close">
          <lucide-icon name="x" [size]="18" />
        </button>
      </div>

      <div class="modal-body">

        <!-- Image / Cropper Area -->
        <div class="image-display-area" (touchstart)="onImageAreaTouchStart($event)">
          @if (imageBase64) {
            <image-cropper
              [imageBase64]="imageBase64"
              [transform]="transform"
              [maintainAspectRatio]="true"
              [aspectRatio]="1"
              [roundCropper]="true"
              [allowMoveImage]="true"
              [hideResizeSquares]="true"
              [backgroundColor]="'#ffffff'"
              format="png"
              output="base64"
              (imageCropped)="imageCropped($event)"
              (cropperReady)="onCropperReady()"
              (transformChange)="onTransformChange($event)"
            ></image-cropper>
          } @else {
            <div class="image-placeholder">
              <div class="placeholder-content">
                <div class="placeholder-icon">
                  <lucide-icon name="upload" [size]="48" />
                </div>
                <p>No image selected</p>
              </div>
            </div>
          }
        </div>

        <!-- Controls Sidebar -->
        <div class="modal-controls-sidebar">

          <div class="control-group">
            <label class="control-label">
              <span>Zoom</span>
              <span class="control-value">{{ zoom.toFixed(1) }}×</span>
            </label>
            <input
              type="range" min="1" max="6" step="0.1"
              [value]="zoom"
              (input)="zoom = +$any($event.target).value; onZoomChange()"
              class="slider"
            />
          </div>

          <div class="control-group">
            <label class="control-label">
              <span>Rotate</span>
              <span class="control-value">{{ rotation }}°</span>
            </label>
            <input
              type="range" min="-180" max="180" step="1"
              [value]="rotation"
              (input)="rotation = +$any($event.target).value; onRotationChange()"
              class="slider"
            />
          </div>

          <div class="modal-buttons">
            <button mat-stroked-button class="btn-browse" (click)="openFileBrowser()">
              <lucide-icon name="folder-open" [size]="16" />
              Browse image
            </button>
            @if (imageState.image && !pendingDelete) {
              <button mat-stroked-button color="warn" class="btn-delete" (click)="deleteImage()">
                <lucide-icon name="trash-2" [size]="16" />
                Remove image
              </button>
            }
            <div class="action-buttons">
              <button mat-button (click)="cancelModal()">Cancel</button>
              <button mat-flat-button color="primary" [disabled]="!pendingDelete && !imageBase64 && !imageState.image" (click)="confirmImage()">
                <lucide-icon name="check" [size]="16" />
                OK
              </button>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
}
