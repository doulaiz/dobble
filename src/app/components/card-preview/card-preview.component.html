@if (cards && cards.length) {
  <div class="card-preview">
    <h2>Generated Cards</h2>
    <div class="cards-grid">
      @for (card of cards; track $index; let ci = $index) {
        <div class="card-wrapper"
             (mouseenter)="onCardMouseEnter(ci)"
             (mouseleave)="onCardMouseLeave(ci)">
          <div class="card" [ngStyle]="cardStyle"
               [style.background-color]="cardLayout.backgroundImage ? null : (marginVisible[ci] ? '#f0f0f0' : 'white')">
            <div class="card-loading-overlay"
                 [class.card-loading-overlay--visible]="isLoading(ci)"></div>
            <div class="card-content"
              [ngStyle]="contentStyle"
              [style.width.px]="contentWidthPx"
              [style.height.px]="contentHeightPx">
              @if (marginDiscStyle) {
                <div [ngStyle]="marginDiscStyle"></div>
              }
              @for (img of card; track $index; let ii = $index) {
                <div class="card-img-wrapper"
                  [style.left.px]="cardLayouts[ci]?.[ii]?.x"
                  [style.top.px]="cardLayouts[ci]?.[ii]?.y"
                  [style.width.px]="cardLayouts[ci]?.[ii]?.size"
                  [style.height.px]="cardLayouts[ci]?.[ii]?.size"
                  title="Drag to move · Ctrl+click to grow · Shift+click to shrink · Pinch to resize"
                  (mousedown)="onSymbolMouseDown($event, ci, ii)"
                  (touchstart)="onSymbolTouchStart($event, ci, ii)">
                  <img class="card-img" [src]="img"
                    [style.transform]="'rotate(' + (cardLayouts[ci]?.[ii]?.rotate ?? 0) + 'deg)'" />
                </div>
              }
            </div>
          </div>

          @if (cardLayout.shape === 'hexagon') {
            <svg class="card-outline"
                 [attr.width]="cardWidthPx"
                 [attr.height]="cardHeightPx">
              <polygon [attr.points]="hexOutlinePoints"
                       fill="none" stroke="#ccc" stroke-width="1"/>
            </svg>
          }

          <button mat-icon-button class="card-reshuffle-btn" title="Reshuffle layout"
            [class.spinning]="reshufflingCards.has(ci)"
            (click)="reshuffleCard(ci)"
            (animationend)="onReshuffleAnimEnd(ci)">
            <lucide-icon name="shuffle" [size]="15" />
          </button>
        </div>
      }
    </div>
  </div>
} @else {
  <p class="no-cards">No cards generated yet.</p>
}
