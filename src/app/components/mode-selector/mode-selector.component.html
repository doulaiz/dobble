<div class="mode-selector">
  <span class="mode-label">Images per card</span>
  <mat-radio-group class="mode-radio-group" [value]="selected" (change)="selectMode($event.value)">
    <mat-radio-button [value]="4">4 symbols (13 images)</mat-radio-button>
    <mat-radio-button [value]="6">6 symbols (31 images)</mat-radio-button>
    <mat-radio-button [value]="8">8 symbols (57 images)</mat-radio-button>
  </mat-radio-group>
</div>
