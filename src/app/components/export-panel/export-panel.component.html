<div class="export-panel">
  <h2>{{ t().exportImages }}</h2>

  <button
    mat-flat-button
    color="primary"
    class="btn-export"
    [disabled]="!cards || cards.length === 0 || exporting"
    (click)="exportImages()">
    <lucide-icon name="download" [size]="16" />
    {{ exporting ? t().exporting : t().exportImages }}
  </button>
</div>
