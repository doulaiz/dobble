<div class="mode-selector">
  <span class="mode-label">{{ t().imagesPerCard }}</span>
  <mat-radio-group class="mode-radio-group" [value]="selected" (change)="selectMode($event.value)">
    <mat-radio-button [value]="4">4</mat-radio-button>
    <mat-radio-button [value]="6">6</mat-radio-button>
    <mat-radio-button [value]="8">8</mat-radio-button>
  </mat-radio-group>
</div>
